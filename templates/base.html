<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cold Mail — Tanay Jain</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f8f9fa; }
  .sidebar { min-height: 100vh; background: #1a1a2e; }
  .sidebar .nav-link { color: #adb5bd; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.08); border-radius: 6px; }
  .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
  .badge-pending { background: #ffc107; color: #000; }
  .badge-approved { background: #0d6efd; }
  .badge-sent { background: #198754; }
  .badge-rejected { background: #6c757d; }
  .badge-failed { background: #dc3545; }
  .stat-card { border-left: 4px solid; }
  .stat-card.pending { border-color: #ffc107; }
  .stat-card.approved { border-color: #0d6efd; }
  .stat-card.sent { border-color: #198754; }
</style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar py-3 px-3">
      <div class="brand mb-4">&#9993; Cold Mail</div>
      <ul class="nav flex-column gap-1">
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='review' %}active{% endif %}" href="/review">Review Emails</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='startups' %}active{% endif %}" href="/startups">Startups</a></li>
      </ul>
      <hr class="text-secondary">
      <form method="POST" action="/scrape">
        <label class="text-secondary small mb-1">Fetch & generate</label>
        <input type="number" name="max_startups" class="form-control form-control-sm mb-2" value="10" min="1" max="50">
        <button class="btn btn-primary btn-sm w-100" type="submit">Scrape &amp; Draft</button>
      </form>
    </nav>
    <main class="col-md-10 py-4 px-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'success' if cat=='success' else 'info' if cat=='info' else 'danger' }} alert-dismissible fade show" role="alert">
            {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
